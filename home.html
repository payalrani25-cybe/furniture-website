<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxLuxe - Furniture Categories</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #1a1a1a;
            --secondary: #c8a165;
            --bg-light: #f9f9f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body { background-color: var(--bg-light); }

        /* Category Card Styling */
        .category-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 1px solid #f1f5f9;
        }
        
        .category-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border-color: #6366f1; /* Indigo color on hover */
        }

        .category-card img {
            transition: all 0.5s ease;
        }

        .category-card:hover img {
            transform: scale(1.1);
        }
    </style>
</head>
<body class="bg-slate-50">

    <header class="py-12 text-center bg-white shadow-sm mb-10">
        <h1 class="text-5xl font-black text-slate-900 tracking-tighter">
            LUX<span class="text-indigo-600">LUXE</span>
        </h1>
        <p class="text-slate-500 mt-3 text-lg font-medium">Premium Furniture Collections</p>
    </header>

    <div id="category-grid" class="max-w-7xl mx-auto p-6 grid grid-cols-2 md:grid-cols-4 gap-8">
        </div>

    <div class="py-20"></div>

    <script>
        // AAPKA DATA ARRAY
        const categories = [
            { id: 1, name: "sofa", img: "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=500", page: "sofa.html" },
            { id: 7, name: "almira", img: "https://5.imimg.com/data5/SELLER/Default/2023/2/LA/AD/EX/109711794/almari-500x500.jpeg", page: "almira.html" },
            { id: 8, name: "Chairs", img: "https://supremefurniture.co.in/cdn/shop/files/Ornate-Red-Black.jpg?v=1706170905", page: "chair.html" }, 
            { id: 2, name: "Beds", img: "https://images.woodenstreet.de/image/cache/data/bed-with-storage/brixton-sheesham-wood-bed-with-storage-drawers-king-size-honey-finish/new-logo/New+Looks+/3-750x650.jpg", page: "beds.html" },
            { id: 3, name: "Dining Sets", img: "https://m.media-amazon.com/images/I/814PZfK2vxL._AC_UF894,1000_QL80_.jpg", page: "dining-sets.html" },
            { id: 4, name: "Study Tables", img: "https://www.nismaayadecor.in/cdn/shop/files/buy-house-of-woodworm-premium-handcrafted-furniture-noir-study-desk-console-table-black-ebony-finish-lifestyle_1_-Photoroom.jpg?v=1747393648&width=1080", page: "study-tables.html" },
            { id: 5, name: "Centre Tables", img: "https://images.jdmagicbox.com/quickquotes/images_main/-q33hxnn2.jpg", page: "centre-tables.html" },
            { id: 6, name: "Wardrobes", img: "https://m.media-amazon.com/images/I/61QQCZISxvL._AC_UF894,1000_QL80_.jpg", page: "wardrobes.html" },
            { id: 9, name: "Wall Shelf", img: "https://m.media-amazon.com/images/I/61wNbNgf8OL._AC_UF894,1000_QL80_.jpg", page: "wall-shelf.html" },
            { id: 10, name: "Kitchen Furniture", img: "https://www.livehomes.in/crm/public/image/blogs/1387843721716786872.jpg", page: "kitchen-furniture.html" },
            { id: 11, name: "TV Unit", img: "https://m.media-amazon.com/images/I/71H8B1O5nVL.jpg", page: "tv-unit.html" },
            { id: 13, name: "Velvet Ottoman", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS1ITkOYnLk0jbBVBAin2GWR9bIZcEmrQvwjA&s", page: "velvet-ottoman.html" },
            { id: 14, name: "Shoe Rack", img: "https://www.squaro.in/cdn/shop/products/61klPvS39IL._AC_UF894_1000_QL80_FMwebp.webp?v=1679055889&width=1445", page: "shoe-rack.html" },
            { id: 15, name: "Bar Stools", img: "https://www.makemychairs.com/cdn/shop/products/BRY.jpg?v=1697611716&width=1214", page: "bar-stools.html" },
            { id: 17, name: "Walnut Wardrobe", img: "https://images.unsplash.com/photo-1595428774223-ef52624120d2?w=500", page: "walnut-wardrobe.html" },
            { id: 20, name: "Metal Bed Frame", img: "https://cdn.shopify.com/s/files/1/0181/1795/files/Single_Block_Bed_in_Black.jpg", page: "metal-bed-frame.html" }
        ];

        // RENDER FUNCTION
        function renderCategories() {
            const grid = document.getElementById('category-grid');
            if (!grid) return;
            
            grid.innerHTML = ''; 

            categories.forEach(item => {
                // 'onclick' yahan har image/card ko uske page se jodd raha hai
                grid.innerHTML += `
                    <div onclick="window.location.href='${item.page}'" class="category-card bg-white p-5 rounded-[3rem] shadow-sm flex flex-col items-center group">
                        <div class="w-full h-44 overflow-hidden rounded-[2.5rem] mb-4 shadow-inner">
                            <img src="${item.img}" alt="${item.name}" class="w-full h-full object-cover">
                        </div>
                        <h3 class="text-xl font-bold text-slate-800 capitalize tracking-tight">${item.name}</h3>
                        <div class="mt-2 text-indigo-500 opacity-0 group-hover:opacity-100 transition duration-300">
                            Explore Now <i class="fa-solid fa-arrow-right text-xs ml-1"></i>
                        </div>
                    </div>
                `;
            });
        }

        // Page load hone par start karein
        window.addEventListener('DOMContentLoaded', renderCategories);
    </script>
</body>
</html>
