<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofa Palace - Ultimate Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .full-screen-page {
            display: none;
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 1000;
            overflow-y: auto;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .active { display: block !important; }
        .gradient-btn { background: linear-gradient(90deg, #4F46E5 0%, #7C3AED 100%); }
        .booking-btn { background: linear-gradient(90deg, #059669 0%, #10B981 100%); }
    </style>
</head>
<body class="bg-slate-50 font-sans">

   
    <header class="bg-[#1a2a3a] text-white sticky top-0 z-50 shadow-lg w-full">
        <div class="container mx-auto px-6 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
            
            <a href="home.html" class="text-2xl font-extrabold text-yellow-400 tracking-wider no-underline">
                Potodi Furniture
            </a>

            <nav class="flex flex-wrap justify-center gap-6 text-sm font-medium">
                <a href="index.html" class="hover:text-orange-400 transition-colors">Home</a>
                <a href="about.html" class="hover:text-orange-400 transition-colors">About</a>
                <a href="home.html" class="hover:text-orange-400 transition-colors">Products</a>
                <a href="contact.html" class="hover:text-orange-400 transition-colors">Contact</a>
                <a href="history.html" class="hover:text-orange-400 transition-colors">History</a>
            </nav>

            <div class="flex items-center gap-5">
                <div class="relative hidden lg:block">
                    <input type="text" placeholder="Search..." class="bg-white text-slate-900 rounded-full py-1.5 px-4 pl-9 text-xs outline-none w-48">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-2 text-slate-400 text-xs"></i>
                </div>

                <div class="relative cursor-pointer group" onclick="openPage('wishlist-page')">
                    <i class="fa-solid fa-heart text-xl group-hover:text-red-400 transition-colors"></i>
                    <span id="wishlist-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 rounded-full border border-[#1a2a3a]">0</span>
                </div>

                <div class="relative cursor-pointer group" onclick="openPage('cart-page')">
                    <i class="fa-solid fa-cart-shopping text-xl group-hover:text-yellow-400 transition-colors"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-yellow-500 text-slate-900 text-[10px] font-bold px-1.5 rounded-full border border-[#1a2a3a]">0</span>
                </div>
            </div>
        </div>
    </header>
    <main class="container mx-auto p-4 md:p-10">
        <div id="main-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <div id="wishlist-page" class="full-screen-page">
        <div class="p-6 max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <button onclick="closePage('wishlist-page')" class="text-2xl h-10 w-10 flex items-center justify-center bg-gray-100 rounded-full">&larr;</button>
                <h2 class="text-3xl font-extrabold text-slate-800">Wishlist ❤️</h2>
                <div class="w-10"></div>
            </div>
            <div id="wish-content" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </div>
    </div>
    

    <div id="cart-page" class="full-screen-page">
        <div class="p-6 max-w-3xl mx-auto h-full flex flex-col">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <button onclick="closePage('cart-page')" class="text-2xl h-10 w-10 flex items-center justify-center bg-gray-100 rounded-full">&larr;</button>
                <h2 class="text-3xl font-extrabold text-slate-800"> Cart 🛒</h2>
                <div class="w-10"></div>
            </div>
            <div id="cart-content" class="flex-1 overflow-y-auto space-y-6">
                </div>
            <div class="mt-6 p-8 bg-slate-900 rounded-3xl text-white shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-slate-400 text-lg font-medium">Grand Total</span>
                    <span id="grand-total" class="text-3xl font-black">₹0</span>
                </div>
                <button onclick="handleBooking('All Cart Items')" class="w-full booking-btn py-5 rounded-2xl font-bold text-xl uppercase tracking-widest shadow-lg transform active:scale-95 transition">Confirm Booking Now</button>
            </div>
        </div>
    </div>

    <script src="almira.js"></script>

</body>
</html>
