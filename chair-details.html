<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail - LuxLuxe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Meesho jaisa gallery layout */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }
        .gallery-item {
            cursor: pointer;
            border-radius: 1rem;
            overflow: hidden;
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .gallery-item.active {
            border-color: #6366f1; /* Indigo color for active image */
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Chhedchad na karein to inhein hide kar dein */
        #zoom-lens, #zoom-result { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <div class="p-6">
        <button onclick="history.back()" class="inline-flex items-center gap-2 text-slate-600 font-bold hover:text-black transition">
            <i class="fa-solid fa-arrow-left"></i> Back
        </button>
    </div>

    <div id="product-container" class="max-w-7xl mx-auto p-6 grid grid-cols-1 md:grid-cols-2 gap-12">
        <div class="space-y-4">
            <div class="relative bg-white p-4 rounded-[3rem] shadow-sm border border-slate-100 flex items-center justify-center">
                <img id="detail-main-img" src="" class="w-full h-[400px] object-contain rounded-[2rem]">
            </div>
            
            <div id="thumb-container" class="gallery-grid">
                </div>
        </div>

        <div class="flex flex-col justify-center space-y-6">
            <div>
                <span id="category-tag" class="bg-indigo-100 text-indigo-600 px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Luxury</span>
                <h1 id="detail-title" class="text-4xl md:text-5xl font-black text-slate-900 leading-tight mt-2">Loading...</h1>
                <p id="detail-price" class="text-3xl font-black text-indigo-600 mt-2"></p>
            </div>

            <div class="space-y-4">
                <h3 class="text-xl font-bold text-slate-800">About this product</h3>
                <p id="detail-desc" class="text-slate-500 leading-relaxed text-lg"></p>
            </div>

            <div class="pt-6">
                <button onclick="handleBooking()" class="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black text-xl hover:bg-slate-700 active:scale-95 transition-all shadow-xl">
                    BOOK NOW
                </button>
            </div>
        </div>
    </div>

    <script src="sofa.js"></script>
    <script src="chair.js"></script>
    <script src="almira.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        window.onload = function() {
            let masterList = [];
            if (typeof sofa !== 'undefined') masterList = [...masterList, ...sofa];
            if (typeof chair !== 'undefined') masterList = [...masterList, ...chair];
            if (typeof almira !== 'undefined') masterList = [...masterList, ...almira];

            const item = masterList.find(p => p.id == productId);

            if (!item) {
                document.getElementById('product-container').innerHTML = `
                    <div class="col-span-full text-center py-20">
                        <h1 class="text-3xl font-bold text-red-500">Product Not Found!</h1>
                        <a href="index.html" class="mt-6 inline-block bg-slate-900 text-white px-8 py-3 rounded-full">Back to Home</a>
                    </div>`;
                return;
            }

            // Fill details
            document.getElementById('detail-main-img').src = item.img;
            document.getElementById('detail-title').innerText = item.title;
            document.getElementById('detail-price').innerText = "₹" + item.price.toLocaleString();
            document.getElementById('detail-desc').innerText = item.desc;

            // Gallery logic (Meesho style fixed teen thumbnails)
            const thumbBox = document.getElementById('thumb-container');
            const gallery = (item.gallery && item.gallery.length >= 3) ? item.gallery.slice(0, 3) : [];
            
            thumbBox.innerHTML = '';
            
            if (gallery.length > 0) {
                // Main image also needs to become a gallery item if you want Meesho style
                // but since you don't want to change the main image logic, 
                // we only use gallery images
                gallery.forEach((src) => {
                    thumbBox.innerHTML += `
                        <div class="gallery-item" onclick="changeImg('${src}', this)">
                            <img src="${src}" class="w-full h-24 object-cover">
                        </div>`;
                });
            } else {
                // If no gallery, hide the container or show placeholders
                thumbBox.style.display = 'none';
            }
        };

        function changeImg(src, el) {
            // Main image update on thumbnail touch
            document.getElementById('detail-main-img').src = src;
            
            // Remove active style from all thumbs
            document.querySelectorAll('.gallery-item').forEach(t => t.classList.remove('active'));
            
            // Add active style to current thumb
            el.classList.add('active');
        }

        function handleBooking() {
            alert("🎉 Booking Successful for: " + document.getElementById('detail-title').innerText);
        }
    </script>
</body>
</html>
