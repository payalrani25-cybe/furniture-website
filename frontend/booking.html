<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofa Palace - Confirm Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans p-4 md:p-10">

    <div class="max-w-xl mx-auto bg-white p-8 rounded-[2.5rem] shadow-2xl border border-gray-100">
        <h2 class="text-3xl font-black text-slate-800 mb-2">Final Step! 🛋️</h2>
        <p class="text-slate-500 mb-8">Apni details bharein taaki hum aapse contact kar sakein.</p>

        <form id="bookingForm" class="space-y-6">
            <input type="hidden" id="productName">

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Pura Naam (Full Name)</label>
                <input type="text" id="uName" required placeholder="Ex: Rahul Kumar" 
                class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-indigo-500 rounded-2xl outline-none transition">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Phone Number</label>
                    <input type="tel" id="uPhone" required placeholder="9876543210" 
                    class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-indigo-500 rounded-2xl outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Gaon / Shahar</label>
                    <input type="text" id="uCity" required placeholder="Ex: Lucknow" 
                    class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-indigo-500 rounded-2xl outline-none transition">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Pura Pata (Full Address)</label>
                <textarea id="uAddress" required rows="3" placeholder="Ghar ka number, gali, landmark..." 
                class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-indigo-500 rounded-2xl outline-none transition"></textarea>
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-xl shadow-xl hover:bg-slate-900 transition-all">
                CONFIRM VIA WHATSAPP
            </button>
        </form>
    </div>

    <script>
        // URL se product ka naam nikalne ke liye
        const params = new URLSearchParams(window.location.search);
        const item = params.get('item');
        document.getElementById('productName').value = item || "Sofa Model";

        document.getElementById('bookingForm').onsubmit = async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('uName').value;
            const phone = document.getElementById('uPhone').value;
            const city = document.getElementById('uCity').value;
            const address = document.getElementById('uAddress').value;
            const product = document.getElementById('productName').value;

            // Save to Backend Database
            try {
                await fetch('http://localhost:5000/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        guestName: name,
                        phone: phone,
                        address: `${city}, ${address}`,
                        items: [{ title: product, price: 0, qty: 1 }],
                        totalAmount: 0
                    })
                });
            } catch (err) { console.error("Sync Failed", err); }

            const msg = `*NEW ORDER ALERT*%0A------------------------%0A*Item:* ${product}%0A*Name:* ${name}%0A*Phone:* ${phone}%0A*City:* ${city}%0A*Address:* ${address}%0A------------------------`;
            const myNumber = "919876543210"; 
            window.open(`https://wa.me/${myNumber}?text=${msg}`, '_blank');
            alert("Booking Confirmed!");
            window.location.href = "index.html";
        };
    </script>
</body>
</html>
