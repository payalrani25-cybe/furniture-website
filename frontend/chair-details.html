<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofa Luxe - Premium 3D View & Zoom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        /* Zoom Styles */
        .zoom-area {
            position: relative;
            cursor: crosshair;
            overflow: visible;
        }

        #lens {
            position: absolute;
            border: 1px solid #4f46e5;
            width: 140px;
            height: 140px;
            background-color: rgba(79, 70, 229, 0.1);
            display: none;
            z-index: 10;
            pointer-events: none; /* Mouse bypass karne ke liye */
            border-radius: 10px;
        }

        #zoom-result {
            position: absolute;
            background-repeat: no-repeat;
            background-color: white;
            display: none;
            z-index: 100;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 2px solid #f1f5f9;
        }

        /* Desktop: Side Zoom */
        @media (min-width: 1024px) {
            #zoom-result {
                left: 105%;
                top: 0;
                width: 500px;
                height: 500px;
            }
        }

        /* Mobile: Inner Zoom */
        @media (max-width: 1023px) {
            #zoom-result {
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
            }
            #lens { display: none !important; }
        }

        model-viewer::part(poster) {
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: #ffffff;
        }
    </style>
</head>

<body class="bg-slate-50 font-sans p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <button onclick="history.back()"
            class="mb-6 font-bold text-indigo-600 flex items-center gap-2 hover:translate-x-[-5px] transition-transform">
            <span>←</span> Back to Shop
        </button>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">

            <div class="space-y-6">
                <div class="zoom-area bg-white rounded-[3rem] shadow-2xl p-4 border border-slate-100 relative h-[450px] flex items-center justify-center" id="img-container">
                    
                    <div id="lens"></div>
                    
                    <img id="main-img" src="" class="max-w-full max-h-full object-contain rounded-3xl transition-opacity duration-300">

                    <model-viewer id="main-3d" src="" poster="" ar camera-controls auto-rotate shadow-intensity="1"
                        class="hidden w-full h-full">
                        <div slot="poster" id="custom-poster" class="w-full h-full flex items-center justify-center bg-white">
                            <img id="poster-img" src="" class="w-full h-full object-contain">
                        </div>
                    </model-viewer>

                    <div id="zoom-result"></div>
                </div>

                <div id="thumb-container" class="flex gap-4 overflow-x-auto py-2 px-1"></div>
            </div>

            <div class="flex flex-col justify-center space-y-6 relative">
                <div>
                    <h1 id="p-title" class="text-5xl font-black text-slate-800 leading-tight">Loading...</h1>
                    <p id="p-price" class="text-3xl text-indigo-600 font-extrabold mt-3 italic"></p>
                </div>

                <div class="h-[2px] bg-slate-200 w-20"></div>

                <p id="p-desc" class="text-slate-500 text-lg leading-relaxed"></p>
                <p id="p-specs" class="text-slate-500 text-lg leading-relaxed"></p>

                <div class="pt-6">
                    <button class="w-full md:w-auto bg-slate-900 text-white px-12 py-5 rounded-2xl font-black text-xl shadow-xl hover:bg-indigo-600 transition-all active:scale-95">
                        Book Now
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="chairs.js"></script>

    <script>
        function applyZoom() {
            const img = document.getElementById("main-img");
            const result = document.getElementById("zoom-result");
            const lens = document.getElementById("lens");
            const container = document.getElementById("img-container");

            if (!img.complete) return;

            // Setup background image for zoom
            result.style.backgroundImage = `url('${img.src}')`;

            const moveLens = (e) => {
                const isMobile = window.innerWidth < 1024;
                result.style.display = "block";
                if(!isMobile) lens.style.display = "block";

                const rect = img.getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();

                // Mouse/Touch coordinates
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                let x = clientX - rect.left;
                let y = clientY - rect.top;

                // Lens calculation
                let lx = x - (lens.offsetWidth / 2);
                let ly = y - (lens.offsetHeight / 2);

                // Boundaries
                if (lx < 0) lx = 0;
                if (ly < 0) ly = 0;
                if (lx > img.width - lens.offsetWidth) lx = img.width - lens.offsetWidth;
                if (ly > img.height - lens.offsetHeight) ly = img.height - lens.offsetHeight;

                // Desktop lens position
                if(!isMobile) {
                    lens.style.left = (lx + (rect.left - containerRect.left)) + "px";
                    lens.style.top = (ly + (rect.top - containerRect.top)) + "px";
                }

                // Zoom Math
                const cx = result.offsetWidth / (isMobile ? img.width / 1.5 : lens.offsetWidth);
                const cy = result.offsetHeight / (isMobile ? img.height / 1.5 : lens.offsetHeight);

                result.style.backgroundSize = (img.width * cx) + "px " + (img.height * cy) + "px";
                
                if (isMobile) {
                    result.style.backgroundPosition = `-${x * cx - (result.offsetWidth / 2)}px -${y * cy - (result.offsetHeight / 2)}px`;
                } else {
                    result.style.backgroundPosition = `-${lx * cx}px -${ly * cy}px`;
                }
            };

            container.addEventListener("mousemove", moveLens);
            container.addEventListener("touchmove", moveLens, {passive: false});

            container.addEventListener("mouseleave", () => {
                lens.style.display = "none";
                result.style.display = "none";
            });
            container.addEventListener("touchend", () => {
                result.style.display = "none";
            });
        }

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id') || 0;
            const currentItem = product.find(p => p.id == productId);

            if (currentItem) {
                document.getElementById('p-title').innerText = currentItem.title;
                document.getElementById('p-price').innerText = "₹" + currentItem.price.toLocaleString();
                document.getElementById('p-desc').innerHTML = currentItem.desc;
                document.getElementById('p-specs').innerHTML = currentItem.specs || "";

                const mainImg = document.getElementById('main-img');
                mainImg.src = currentItem.img;
                
                // Initialize zoom after image load
                mainImg.onload = applyZoom;

                const container = document.getElementById('thumb-container');
                container.innerHTML = ''; 

                currentItem.gallery.forEach((url, index) => {
                    const img = document.createElement('img');
                    img.src = url;
                    img.className = `w-20 h-20 shrink-0 object-cover rounded-2xl cursor-pointer border-2 transition-all ${index === 0 ? 'border-indigo-600' : 'border-transparent'}`;
                    
                    img.onclick = () => {
                        mainImg.src = url;
                        setTimeout(applyZoom, 100);
                        document.querySelectorAll('#thumb-container img').forEach(t => t.classList.remove('border-indigo-600'));
                        img.classList.add('border-indigo-600');
                    };
                    container.appendChild(img);
                });
            }
        };

        window.onresize = applyZoom;
    </script>

</body>
</html>
