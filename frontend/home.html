<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

   <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #1a1a1a;
            --secondary: #c8a165;
            --bg-light: #f9f9f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body { background-color: var(--bg-light); }

        /* Category Card Styling */
        .category-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 1px solid #f1f5f9;
        }
        
        .category-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border-color: #6366f1; /* Indigo color on hover */
        }

        .category-card img {
            transition: all 0.5s ease;
        }

        .category-card:hover img {
            transform: scale(1.1);
        }
    </style>
</head>
<body class="bg-slate-50">

     
       <script src="header.js"></script>
    <link rel="stylesheet" href="header-premium.css">



    <div id="category-grid" class="max-w-7xl mx-auto p-6 grid grid-cols-2 md:grid-cols-4 gap-8">
        </div>

    <div class="py-20"></div>

<footer class="bg-[#1a2a3a] text-slate-300 py-8 mt-auto w-full border-t border-slate-700">
    <div class="container mx-auto px-6">

            <div class="footer-col fontChange">
                <h3 class="text-white font-bold text-sm mb-3 border-b border-slate-700 pb-1 inline-block translate"

        <div class="mt-8 pt-4 border-t border-slate-700 flex flex-col md:flex-row justify-between items-center gap-4">
            
            <div class="relative group">
                <button class="bg-slate-800 border border-slate-600 px-3 py-1 rounded text-[10px] flex items-center gap-2 hover:bg-slate-700">

</footer>
    <script>
        // AAPKA DATA ARRAY
        const categories = [
            { id: 1, name: "sofa", img: "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=500", page: "sofa.html" },
            { id: 7, name: "almira", img: "https://5.imimg.com/data5/SELLER/Default/2023/2/LA/AD/EX/109711794/almari-500x500.jpeg", page: "almira.html" },
            { id: 8, name: "chair", img: "https://supremefurniture.co.in/cdn/shop/files/Ornate-Red-Black.jpg?v=1706170905", page: "chairs.html" }, 
            { id: 2, name: "Beds", img: "https://images.woodenstreet.de/image/cache/data/bed-with-storage/brixton-sheesham-wood-bed-with-storage-drawers-king-size-honey-finish/new-logo/New+Looks+/3-750x650.jpg", page: "bed.html" },
            { id: 4, name: "Tables", img: "https://www.nismaayadecor.in/cdn/shop/files/buy-house-of-woodworm-premium-handcrafted-furniture-noir-study-desk-console-table-black-ebony-finish-lifestyle_1_-Photoroom.jpg?v=1747393648&width=1080", page: "table.html" },
            { id: 5, name: "Centre Tables", img: "https://images.jdmagicbox.com/quickquotes/images_main/-q33hxnn2.jpg", page: "center.html" },
            { id: 6, name: "Wardrobes", img: "https://m.media-amazon.com/images/I/61QQCZISxvL._AC_UF894,1000_QL80_.jpg", page: "wardrobes.html" },
            
        ];

        // RENDER FUNCTION
        function renderCategories() {
            const grid = document.getElementById('category-grid');
            if (!grid) return;
            
            grid.innerHTML = ''; 

            categories.forEach(item => {
                // 'onclick' yahan har image/card ko uske page se jodd raha hai
                grid.innerHTML += `
                    <div onclick="window.location.href='${item.page}'" class="category-card bg-white p-5 rounded-[3rem] shadow-sm flex flex-col items-center group">
                        <div class="w-full h-44 overflow-hidden rounded-[2.5rem] mb-4 shadow-inner">
                            <img src="${item.img}" alt="${item.name}" class="w-full h-full object-cover">
                        </div>
                        <h3 class="text-xl font-bold text-slate-800 capitalize tracking-tight">${item.name}</h3>
                        <div class="mt-2 text-indigo-500 opacity-0 group-hover:opacity-100 transition duration-300">
                            Explore Now <i class="fa-solid fa-arrow-right text-xs ml-1"></i>
                        </div>
                    </div>
                `;
            });
        }

        // Page load hone par start karein
        window.addEventListener('DOMContentLoaded', renderCategories);


    </script>
</body>
