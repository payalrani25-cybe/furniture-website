<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wardrobe Luxe - Premium 3D View & Zoom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        /* --- ZOOM SYSTEM CSS --- */
        .zoom-area {
            position: relative;
            cursor: crosshair;
        }

        #lens {
            position: absolute;
            border: 1.5px solid #4f46e5;
            width: 120px; /* Thoda narrow lens for wardrobes */
            height: 160px;
            background-color: rgba(79, 70, 229, 0.05);
            display: none;
            z-index: 10;
            pointer-events: none;
            border-radius: 8px;
        }

        #zoom-result {
            position: absolute;
            background-repeat: no-repeat;
            display: none;
            z-index: 50;
            background-color: white;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 2px solid #f1f5f9;
        }

        /* Desktop: Side Zoom */
        @media (min-width: 1024px) {
            #zoom-result {
                left: 105%;
                top: 0;
                width: 500px;
                height: 600px; /* Wardrobe ke liye taller window */
            }
        }

        /* Mobile: Overlap Zoom */
        @media (max-width: 1023px) {
            #zoom-result {
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
            }
            #lens { display: none !important; }
        }

        model-viewer::part(poster) {
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
    </style>
</head>

<body class="bg-slate-50 font-sans p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <button onclick="history.back()"
            class="mb-6 font-bold text-indigo-600 flex items-center gap-2 hover:translate-x-[-5px] transition-transform">
            <span>←</span> Back to Collection
        </button>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">

            <div class="space-y-6">
                <div class="zoom-area bg-white rounded-[3rem] shadow-2xl p-4 border border-slate-100 relative h-[500px] flex items-center justify-center" id="img-container">
                    
                    <div id="lens"></div>
                    
                    <img id="main-img" src="" class="max-w-full max-h-full object-contain rounded-3xl transition-opacity duration-300">

                    <model-viewer id="main-3d" src="" poster="" ar camera-controls auto-rotate shadow-intensity="1"
                        class="hidden w-full h-full">
                        <div slot="poster" class="w-full h-full flex items-center justify-center bg-white">
                            <img id="poster-img" src="" class="w-full h-full object-contain">
                        </div>
                    </model-viewer>

                    <div id="zoom-result"></div>
                </div>

                <div id="thumb-container" class="flex gap-4 overflow-x-auto py-2 px-1"></div>
            </div>

            <div class="flex flex-col justify-center space-y-6">
                <div>
                    <h1 id="p-title" class="text-4xl lg:text-5xl font-black text-slate-800 leading-tight">Loading...</h1>
                    <p id="p-price" class="text-3xl text-indigo-600 font-extrabold mt-3 italic"></p>
                </div>

                <div class="h-[3px] bg-indigo-500 w-16"></div>

                <p id="p-desc" class="text-slate-500 text-lg leading-relaxed"></p>
                <div id="p-specs" class="bg-slate-100 p-4 rounded-2xl text-slate-600 text-sm grid grid-cols-2 gap-2"></div>

                <div class="pt-6">
                    <button class="w-full md:w-auto bg-slate-900 text-white px-14 py-5 rounded-2xl font-black text-xl shadow-xl hover:bg-indigo-600 transition-all active:scale-95">
                        Inquiry Now
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="wordrobes.js"></script>

    <script>
        let is3DActive = false;

        function applyZoom() {
            const img = document.getElementById("main-img");
            const result = document.getElementById("zoom-result");
            const lens = document.getElementById("lens");
            const area = document.getElementById("img-container");

            if (is3DActive || !img.src) return;

            result.style.backgroundImage = `url('${img.src}')`;

            const move = (e) => {
                if (is3DActive) return;

                const isMobile = window.innerWidth < 1024;
                result.style.display = "block";
                if(!isMobile) lens.style.display = "block";

                const rect = img.getBoundingClientRect();
                const areaRect = area.getBoundingClientRect();

                const xCoord = e.touches ? e.touches[0].clientX : e.clientX;
                const yCoord = e.touches ? e.touches[0].clientY : e.clientY;

                let x = xCoord - rect.left;
                let y = yCoord - rect.top;

                let lx = x - (lens.offsetWidth / 2);
                let ly = y - (lens.offsetHeight / 2);

                if (lx < 0) lx = 0;
                if (ly < 0) ly = 0;
                if (lx > img.width - lens.offsetWidth) lx = img.width - lens.offsetWidth;
                if (ly > img.height - lens.offsetHeight) ly = img.height - lens.offsetHeight;

                if(!isMobile) {
                    lens.style.left = (lx + (rect.left - areaRect.left)) + "px";
                    lens.style.top = (ly + (rect.top - areaRect.top)) + "px";
                }

                const cx = result.offsetWidth / (isMobile ? img.width / 2 : lens.offsetWidth);
                const cy = result.offsetHeight / (isMobile ? img.height / 2 : lens.offsetHeight);

                result.style.backgroundSize = (img.width * cx) + "px " + (img.height * cy) + "px";
                
                if (isMobile) {
                    result.style.backgroundPosition = `-${x * cx - (result.offsetWidth / 2)}px -${y * cy - (result.offsetHeight / 2)}px`;
                } else {
                    result.style.backgroundPosition = `-${lx * cx}px -${ly * cy}px`;
                }
            };

            area.addEventListener("mousemove", move);
            area.addEventListener("touchmove", move, {passive: false});

            const hide = () => {
                lens.style.display = "none";
                result.style.display = "none";
            };

            area.addEventListener("mouseleave", hide);
            area.addEventListener("touchend", hide);
        }

        function toggleMedia(to3D, url = null) {
            const imgEl = document.getElementById('main-img');
            const modelEl = document.getElementById('main-3d');
            
            if(to3D) {
                is3DActive = true;
                imgEl.classList.add('hidden');
                modelEl.classList.remove('hidden');
                document.getElementById('zoom-result').style.display = 'none';
            } else {
                is3DActive = false;
                imgEl.classList.remove('hidden');
                modelEl.classList.add('hidden');
                if(url) imgEl.src = url;
                setTimeout(applyZoom, 100);
            }
        }

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id') || 0;
            const item = product.find(p => p.id == id);

            if (item) {
                document.getElementById('p-title').innerText = item.title;
                document.getElementById('p-price').innerText = "₹" + item.price.toLocaleString();
                document.getElementById('p-desc').innerHTML = item.desc;
                document.getElementById('p-specs').innerHTML = item.specs || "";
                
                const model = document.getElementById('main-3d');
                model.src = item.model3d || "";
                document.getElementById('poster-img').src = item.img;

                const mainImg = document.getElementById('main-img');
                mainImg.src = item.img;
                mainImg.onload = applyZoom;

                const thumbs = document.getElementById('thumb-container');
                thumbs.innerHTML = ''; 

                // 3D Button
                const btn3D = document.createElement('div');
                btn3D.className = "min-w-[90px] h-20 bg-indigo-600 text-white rounded-2xl flex flex-col items-center justify-center cursor-pointer shadow-lg shrink-0 group";
                btn3D.innerHTML = `<img src="https://cdn-icons-png.flaticon.com/512/3504/3504384.png" class="w-7 h-7 invert group-hover:rotate-12 transition"><span class="text-[9px] font-bold mt-1 tracking-widest">3D VIEW</span>`;
                btn3D.onclick = () => toggleMedia(true);
                thumbs.appendChild(btn3D);

                // Gallery
                item.gallery.forEach((url, idx) => {
                    const t = document.createElement('img');
                    t.src = url;
                    t.className = `w-20 h-20 shrink-0 object-cover rounded-2xl cursor-pointer border-2 transition-all ${idx === 0 ? 'border-indigo-600' : 'border-transparent'}`;
                    t.onclick = () => {
                        toggleMedia(false, url);
                        document.querySelectorAll('#thumb-container img').forEach(i => i.classList.remove('border-indigo-600'));
                        t.classList.add('border-indigo-600');
                    };
                    thumbs.appendChild(t);
                });
            }
        };

        window.onresize = applyZoom;
    </script>
</body>
</html>
