<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patodi Furniture | Responsive Zoom Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Main Image Container */
        .img-container {
            position: relative;
            width: 100%;
            height: 350px; /* Mobile height choti rakhi hai */
            background: white;
            border-radius: 20px;
            overflow: visible; 
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e2e8f0;
            cursor: crosshair;
        }

        @media (min-width: 1024px) {
            .img-container { height: 500px; } /* Desktop height */
        }

        /* Zoom Lens */
        #lens {
            position: absolute;
            width: 120px;
            height: 120px;
            background: rgba(79, 70, 229, 0.1);
            border: 1px solid #4f46e5;
            display: none;
            z-index: 10;
            pointer-events: none;
        }

        /* Side Zoom Result */
        #zoom-result {
            position: absolute;
            background-repeat: no-repeat;
            background-color: white;
            display: none;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 2px solid #cbd5e1;
            border-radius: 20px;
        }

        /* Desktop: Side positioning */
        @media (min-width: 1024px) {
            #zoom-result {
                left: 105%;
                top: 0;
                width: 500px;
                height: 500px;
            }
        }

        /* Mobile: Overlay positioning (Inner Zoom) */
        @media (max-width: 1023px) {
            #zoom-result {
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                border-radius: 20px;
            }
            #lens { display: none !important; } /* Mobile par lens ki zarurat nahi */
        }

        #main-img {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-10">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12">
        
        <div class="relative order-1">
            <div class="img-container" id="zoom-area">
                <div id="lens"></div>
                <img id="main-img" src="" alt="Sofa">
                <div id="zoom-result"></div>
            </div>

            <div id="thumb-container" class="flex gap-3 mt-4 overflow-x-auto pb-2 scrollbar-hide">
                </div>
        </div>

        <div class="flex flex-col justify-center space-y-4 order-2">
            <div>
                <h1 id="p-title" class="text-3xl lg:text-5xl font-black text-slate-800 leading-tight">Loading...</h1>
                <p id="p-price" class="text-2xl text-indigo-600 font-bold mt-2"></p>
            </div>
            
            <div class="h-[2px] bg-slate-200 w-20"></div>
            
            <div id="p-desc" class="text-slate-500 text-base lg:text-lg leading-relaxed"></div>
            
            <div class="pt-4">
                <button class="w-full lg:w-fit bg-slate-900 text-white px-10 py-4 rounded-2xl font-bold hover:bg-indigo-600 transition shadow-lg active:scale-95">
                    BOOK NOW
                </button>
            </div>
        </div>
    </div>

    <script src="almira.js"></script>
    <script>
        function applyZoom() {
            const img = document.getElementById("main-img");
            const result = document.getElementById("zoom-result");
            const lens = document.getElementById("lens");
            const area = document.getElementById("zoom-area");

            const isMobile = window.innerWidth < 1024;

            result.style.backgroundImage = `url('${img.src}')`;

            const moveHandler = (e) => {
                result.style.display = "block";
                if (!isMobile) lens.style.display = "block";

                const rect = img.getBoundingClientRect();
                const areaRect = area.getBoundingClientRect();

                // Get coordinates based on touch or mouse
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                let x = clientX - rect.left;
                let y = clientY - rect.top;

                let lx = x - (lens.offsetWidth / 2);
                let ly = y - (lens.offsetHeight / 2);

                // Boundaries
                if (lx < 0) lx = 0;
                if (ly < 0) ly = 0;
                if (lx > img.width - lens.offsetWidth) lx = img.width - lens.offsetWidth;
                if (ly > img.height - lens.offsetHeight) ly = img.height - lens.offsetHeight;

                // Move Lens (Desktop only)
                if (!isMobile) {
                    lens.style.left = (lx + (rect.left - areaRect.left)) + "px";
                    lens.style.top = (ly + (rect.top - areaRect.top)) + "px";
                }

                // Zoom Logic
                const cx = result.offsetWidth / (isMobile ? img.width / 2 : lens.offsetWidth);
                const cy = result.offsetHeight / (isMobile ? img.height / 2 : lens.offsetHeight);

                result.style.backgroundSize = (img.width * cx) + "px " + (img.height * cy) + "px";
                
                // Mobile par x,y ko adjust karna padta hai kyunki lens nahi hota
                if (isMobile) {
                    result.style.backgroundPosition = `-${x * cx - (result.offsetWidth/2)}px -${y * cy - (result.offsetHeight/2)}px`;
                } else {
                    result.style.backgroundPosition = `-${lx * cx}px -${ly * cy}px`;
                }
            };

            area.addEventListener("mousemove", moveHandler);
            area.addEventListener("touchmove", moveHandler, { passive: false });

            const hideZoom = () => {
                lens.style.display = "none";
                result.style.display = "none";
            };

            area.addEventListener("mouseleave", hideZoom);
            area.addEventListener("touchend", hideZoom);
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id') || 0;
            const item = product.find(p => p.id == id);

            if (item) {
                document.getElementById('p-title').innerText = item.title;
                document.getElementById('p-price').innerText = "₹" + item.price.toLocaleString();
                document.getElementById('p-desc').innerHTML = item.desc;

                const mainImg = document.getElementById('main-img');
                mainImg.src = item.img;
                mainImg.onload = applyZoom;

                const tBox = document.getElementById('thumb-container');
                item.gallery.forEach(url => {
                    const t = document.createElement('img');
                    t.src = url;
                    t.className = "w-16 h-16 lg:w-20 lg:h-20 flex-shrink-0 rounded-xl cursor-pointer border-2 border-transparent hover:border-indigo-500 object-cover";
                    t.onclick = () => {
                        mainImg.src = url;
                        setTimeout(applyZoom, 100);
                    };
                    tBox.appendChild(t);
                });
            }
        };

        // Screen resize par zoom recalculate karein
        window.onresize = applyZoom;
    </script>
</body>
</html>
