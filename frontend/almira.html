<!DOCTYPE html>


<html lang="en">


<head>


    <meta charset="UTF-8">


    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>Sofa Palace - Ultimate Experience</title>


    <script src="https://cdn.tailwindcss.com"></script>


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">


    <style>
        .full-screen-page {


            display: none;


            position: fixed;

            inset: 0;


            background: #ffffff;


            z-index: 1000;


            overflow-y: auto;


            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);


        }


        @keyframes slideUp {


            from {
                transform: translateY(100%);
            }


            to {
                transform: translateY(0);
            }


        }


        .active {
            display: block !important;
        }


        .gradient-btn {
            background: linear-gradient(90deg, #4F46E5 0%, #7C3AED 100%);
        }


        .booking-btn {
            background: linear-gradient(90deg, #059669 0%, #10B981 100%);
        }
    </style>


</head>


<body class="bg-slate-50 font-sans">






    <script src="header.js"></script>
    <link rel="stylesheet" href="header-premium.css">




    <main class="container mx-auto p-4 md:p-10">


        <div id="main-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">


        </div>


    </main>






    <div id="wishlist-page" class="full-screen-page">


        <div class="p-6 max-w-5xl mx-auto">


            <div class="flex justify-between items-chairs mb-8 border-b pb-4">


                <button onclick="closePage('wishlist-page')"
                    class="text-2xl h-10 w-10 flex items-chairs justify-chairs bg-gray-100 rounded-full">&larr;</button>


                <h2 class="text-3xl font-extrabold text-slate-800">Wishlist ❤️</h2>


                <div class="w-10"></div>


            </div>


            <div id="wish-content" class="grid grid-cols-1 md:grid-cols-2 gap-6">


            </div>


        </div>


    </div>








    <div id="cart-page" class="full-screen-page">


        <div class="p-6 max-w-3xl mx-auto h-full flex flex-col">


            <div class="flex justify-between items-chairs mb-8 border-b pb-4">


                <button onclick="closePage('cart-page')"
                    class="text-2xl h-10 w-10 flex items-chairs justify-chairs bg-gray-100 rounded-full">&larr;</button>


                <h2 class="text-3xl font-extrabold text-slate-800"> Cart 🛒</h2>


                <div class="w-10"></div>


            </div>


            <div id="cart-content" class="flex-1 overflow-y-auto space-y-6">


            </div>


            <div class="mt-6 p-8 bg-slate-900 rounded-3xl text-white shadow-2xl">


                <div class="flex justify-between items-chairs mb-6">




                    <div id="star-rating" class="flex gap-2 text-2xl cursor-pointer py-2">
                        <i class="fa-solid fa-star" style="color: #1755ac;" onclick="setRating(1)"></i>
                        <i class="fa-solid fa-star" style="color: #4b5563;" onclick="setRating(2)"></i>
                        <i class="fa-solid fa-star" style="color: #4b5563;" onclick="setRating(3)"></i>
                        <i class="fa-solid fa-star" style="color: #4b5563;" onclick="setRating(4)"></i>
                        <i class="fa-solid fa-star" style="color: #4b5563;" onclick="setRating(5)"></i>
                    </div>


                    <span class="text-slate-400 text-lg font-medium">Grand Total</span>


                    <span id="grand-total" class="text-3xl font-black">₹0</span>


                </div>


                <button onclick="handleBooking('All Cart Items')"
                    class="w-full booking-btn py-5 rounded-2xl font-bold text-xl uppercase tracking-widest shadow-lg transform active:scale-95 transition">Confirm
                    Booking Now</button>


            </div>


        </div>


    </div>


    <script src="almira.js"></script>



</body>


</html>
