<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sofa Palace - Ultimate Experience</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

.full-screen-page {

display: none;

position: fixed;

inset: 0;

background: #ffffff;

z-index: 1000;

overflow-y: auto;

animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);

}

@keyframes slideUp {

from { transform: translateY(100%); }

to { transform: translateY(0); }

}

.active { display: block !important; }

.gradient-btn { background: linear-gradient(90deg, #4F46E5 0%, #7C3AED 100%); }

.booking-btn { background: linear-gradient(90deg, #059669 0%, #10B981 100%); }

</style>

</head>

<body class="bg-slate-50 font-sans">

  <header class="main-header"  style="display: flex; justify-content: space-between;" >
     
      <nav class="w-full bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-gray-200 shadow-sm">
    <div class="w-full px-6 md:px-12 py-4 flex items-center justify-between gap-8">
        
        <div class="flex-shrink-0">
            <h1 class="text-2xl font-black italic text-indigo-600 tracking-tighter">
                Chair<span class="text-slate-800">LUXE</span>
            </h1>
        </div>

        <div class="hidden lg:flex items-center gap-10 font-bold text-slate-700 uppercase text-xs tracking-widest">
            <a href="home.html" class="hover:text-indigo-600 transition-colors border-b-2 border-transparent hover:border-indigo-600 pb-1">Home</a>
            <a href="about.html" class="hover:text-indigo-600 transition-colors border-b-2 border-transparent hover:border-indigo-600 pb-1">About</a>
            <a href="chairs.html" class="text-indigo-600 border-b-2 border-indigo-600 pb-1">Furnitures</a>
            <a href="contact.html" class="hover:text-indigo-600 transition-colors border-b-2 border-transparent hover:border-indigo-600 pb-1">Contact</a>
            <a href="history.html" class="hover:text-indigo-600 transition-colors border-b-2 border-transparent hover:border-indigo-600 pb-1">History</a>
        </div>

        <div class="flex items-center gap-6 flex-1 justify-end">
            
            <div class="relative w-full max-w-xs hidden sm:block">
                <input type="text" id="search-input" 
                    class="w-full bg-gray-100 border-none rounded-lg py-2 pl-10 pr-4 focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all outline-none text-sm" 
                    placeholder="Search premium collection...">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="openPage('wishlist-page')" class="relative p-2 text-slate-700 hover:text-red-500 transition-transform active:scale-90">
                    <i class="fa-solid fa-heart text-xl"></i>
                    <span id="wish-badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold h-5 w-5 flex items-center justify-center rounded-full border-2 border-white shadow-sm">0</span>
                </button>

                <button onclick="openPage('cart-page')" class="relative p-2 text-slate-700 hover:text-indigo-600 transition-transform active:scale-90">
                    <i class="fa-solid fa-bag-shopping text-xl"></i>
                    <span id="cart-badge" class="absolute -top-1 -right-1 bg-indigo-600 text-white text-[10px] font-bold h-5 w-5 flex items-center justify-center rounded-full border-2 border-white shadow-sm">0</span>
                </button>
            </div>
        </div>

    </div>
</nav>
    </header>




<main class="container mx-auto p-4 md:p-10">

<div id="main-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">

</div>

</main>



<div id="wishlist-page" class="full-screen-page">

<div class="p-6 max-w-5xl mx-auto">

<div class="flex justify-between items-center mb-8 border-b pb-4">

<button onclick="closePage('wishlist-page')" class="text-2xl h-10 w-10 flex items-center justify-center bg-gray-100 rounded-full">&larr;</button>

<h2 class="text-3xl font-extrabold text-slate-800">Wishlist ❤️</h2>

<div class="w-10"></div>

</div>

<div id="wish-content" class="grid grid-cols-1 md:grid-cols-2 gap-6">

</div>

</div>

</div>




<div id="cart-page" class="full-screen-page">

<div class="p-6 max-w-3xl mx-auto h-full flex flex-col">

<div class="flex justify-between items-center mb-8 border-b pb-4">

<button onclick="closePage('cart-page')" class="text-2xl h-10 w-10 flex items-center justify-center bg-gray-100 rounded-full">&larr;</button>

<h2 class="text-3xl font-extrabold text-slate-800"> Cart 🛒</h2>

<div class="w-10"></div>

</div>

<div id="cart-content" class="flex-1 overflow-y-auto space-y-6">

</div>

<div class="mt-6 p-8 bg-slate-900 rounded-3xl text-white shadow-2xl">

<div class="flex justify-between items-center mb-6">


    <div id="star-rating" class="flex gap-2 text-2xl cursor-pointer py-2">
    <i class="fa-solid fa-star" style="color: #1755ac;" onclick="setRating(1)"></i>
    <i class="fa-solid fa-star" style="color: #4b5563;" onclick="setRating(2)"></i>
    <i class="fa-solid fa-star" style="color: #4b5563;" onclick="setRating(3)"></i>
    <i class="fa-solid fa-star" style="color: #4b5563;" onclick="setRating(4)"></i>
    <i class="fa-solid fa-star" style="color: #4b5563;" onclick="setRating(5)"></i>
</div>

<span class="text-slate-400 text-lg font-medium">Grand Total</span>

<span id="grand-total" class="text-3xl font-black">₹0</span>

</div>

<button onclick="handleBooking('All Cart Items')" class="w-full booking-btn py-5 rounded-2xl font-bold text-xl uppercase tracking-widest shadow-lg transform active:scale-95 transition">Confirm Booking Now</button>

</div>

</div>

</div>



<script src="plastics.js"></script>




</body>

</html>
